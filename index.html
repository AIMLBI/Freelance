<form id="loanForm">
  <input type="text" name="name" placeholder="Enter your name" required><br>
  <input type="email" name="email" placeholder="Enter your email" required><br>
  <input type="tel" name="phone" placeholder="Enter your phone number" required><br>
  <select name="loanType" required>
    <option value="">Select Loan Type</option>
    <option value="Personal Loan">Personal Loan</option>
    <option value="Home Loan">Home Loan</option>
    <option value="Car Loan">Car Loan</option>
    <option value="Education Loan">Education Loan</option>
  </select><br>
  <button type="submit">Submit</button>
</form>

<script>
document.getElementById("loanForm").addEventListener("submit", async function(event) {
  event.preventDefault();

  const formData = {
    name: event.target.name.value,
    email: event.target.email.value,
    phone: event.target.phone.value,
    loanType: event.target.loanType.value
  };

  const response = await fetch("http://localhost:3000/submit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(formData)
  });

  const result = await response.text();
  alert(result);
});
</script>
